<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>观好物 · 社区电子价目表后台管理</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts Outfit & Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              DEFAULT: '#dc2626', // red-600 (朱红/车厘子红)
              hover: '#b91c1c',   // red-700
              light: '#fef2f2',   // red-50
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-brand text-white shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <span class="text-xl font-bold tracking-wider">观好物 · 社区数据后台</span>
        <span class="text-xs bg-white/20 px-2 py-0.5 rounded">可视化编辑器</span>
      </div>
      <div class="flex items-center gap-3">
        <!-- Logout Button (Shown after login) -->
        <button id="btn-logout" onclick="handleLogout()" class="hidden text-xs bg-white/10 hover:bg-white/20 text-white font-medium py-1.5 px-3 rounded-md transition-colors duration-200">
          退出登录
        </button>
        <a href="/" class="text-xs bg-white/10 hover:bg-white/20 text-white font-medium py-1.5 px-3 rounded-md transition-colors duration-200 flex items-center gap-1">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
          </svg>
          <span>返回居民端</span>
        </a>
      </div>
    </div>
  </header>

  <!-- 1. 登录屏蔽遮罩 (Flat design red shield modal) -->
  <div id="login-shield" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm transition-opacity duration-300">
    <div class="bg-white rounded-md w-full max-w-md p-6 border border-gray-100 shadow-2xl scale-100 transform transition-all duration-300">
      <div class="text-center mb-6">
        <div class="bg-brand/10 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 text-brand">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-900">管理员安全验证</h3>
        <p class="text-xs text-gray-400 mt-1">此页面包含社区敏感数据，请输入管理员密码进行验证</p>
      </div>
      
      <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">登录密码</label>
          <input type="password" id="login-password" required placeholder="输入管理员密码..." class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors">
        </div>
        <div id="login-error-msg" class="hidden text-xs text-brand font-semibold text-center">
          密码验证失败，请重新输入！
        </div>
        <button type="submit" class="w-full bg-brand hover:bg-brand-hover text-white text-sm font-bold py-2.5 px-4 rounded transition-colors duration-200 active:scale-[0.99] text-center">
          验证并登录
        </button>
      </form>
    </div>
  </div>

  <!-- 2. 拒绝访问提示卡 (Access Denied State) -->
  <div id="access-denied" class="hidden flex-grow flex flex-col items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white rounded-md border border-gray-150 p-8 text-center shadow-sm">
      <div class="bg-brand/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-brand">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <h2 class="text-xl font-bold text-gray-900">访问已被拒绝</h2>
      <p class="text-sm text-gray-500 mt-2 mb-6">您输入的管理员密码不正确或登录状态已过期，无法查看和编辑商品数据。</p>
      <button onclick="showLoginShield()" class="bg-brand hover:bg-brand-hover text-white text-sm font-semibold py-2.5 px-6 rounded transition-colors duration-200">
        重新输入密码
      </button>
    </div>
  </div>

  <!-- 3. 管理后台主要工作区 (Initially Hidden) -->
  <main id="admin-content" class="hidden flex-grow max-w-6xl w-full mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
    
    <!-- Left Column: Form Section -->
    <div class="lg:col-span-1 space-y-6">
      <div class="bg-white rounded-md p-6 border border-gray-100 shadow-sm">
        <div class="flex items-center justify-between mb-5">
          <h2 id="form-title" class="text-lg font-bold text-gray-900">新增商品好物</h2>
          <span id="edit-badge" class="hidden text-xs bg-amber-50 text-amber-700 border border-amber-200 px-2.5 py-0.5 rounded-full font-medium">编辑模式</span>
        </div>

        <form id="product-form" class="space-y-4" onsubmit="handleFormSubmit(event)">
          <!-- Hidden input for editing ID -->
          <input type="hidden" id="product-id">

          <!-- Name -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">商品名称 <span class="text-brand">*</span></label>
            <input type="text" id="name" required placeholder="如：观景里特供·新鲜大草莓" class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors">
          </div>

          <!-- Price -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">价格（元） <span class="text-brand">*</span></label>
            <input type="number" id="price" step="0.01" min="0" required placeholder="0.00" class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors">
          </div>

          <!-- Short Desc -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">列表页简短介绍</label>
            <input type="text" id="short_desc" placeholder="列表卡片展示，一句话卖点..." class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors">
          </div>

          <!-- Long Desc -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">详情页长篇描述</label>
            <textarea id="long_desc" rows="4" placeholder="商品详情、规格参数、包装及物流说明等..." class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors"></textarea>
          </div>

          <!-- Main Image Link / Upload -->
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1 tracking-wider">主图 URL 或上传文件</label>
            <div class="flex gap-2">
              <input type="text" id="main_image" placeholder="/uploads/example.png 或外部图片 URL" class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors">
              <label class="flex-shrink-0 cursor-pointer bg-gray-150 hover:bg-gray-200 border border-gray-300 text-gray-700 text-xs font-semibold px-3 py-2 rounded flex items-center justify-center transition-colors">
                <span>上传</span>
                <input type="file" accept="image/*" class="hidden" onchange="uploadFile(this, 'main_image', 'main-image-preview')">
              </label>
            </div>
            <!-- Main Image Preview -->
            <div class="mt-2 relative group hidden" id="main-image-preview-box">
              <img id="main-image-preview" src="" class="w-full h-32 object-cover rounded border border-gray-100">
              <button type="button" onclick="clearPreview('main_image', 'main-image-preview-box')" class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-1 hover:bg-black/75 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
              </button>
            </div>
          </div>

          <!-- Gallery Images -->
          <div>
            <div class="flex justify-between items-center mb-1">
              <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider">详情页图集 (多图)</label>
              <button type="button" onclick="addGalleryInput('')" class="text-xs text-brand hover:underline font-bold">+ 添加项</button>
            </div>
            
            <div id="gallery-inputs" class="space-y-2">
              <!-- Dynamically populated inputs -->
            </div>
          </div>

          <!-- Action buttons -->
          <div class="pt-4 flex gap-3">
            <button type="submit" id="btn-submit" class="flex-grow bg-brand hover:bg-brand-hover text-white text-sm font-bold py-2.5 px-4 rounded transition-colors duration-200 active:scale-[0.99] text-center">
              保存商品
            </button>
            <button type="button" id="btn-cancel" onclick="resetForm()" class="hidden bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold py-2.5 px-4 rounded transition-colors duration-200">
              取消
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Right Column: Product List Section -->
    <div class="lg:col-span-2 space-y-6">
      <div class="bg-white rounded-md p-6 border border-gray-100 shadow-sm">
        <h2 class="text-lg font-bold text-gray-900 mb-5">已发布商品列表</h2>

        <div id="loading-list" class="py-12 text-center text-gray-400">
          <svg class="animate-spin h-6 w-6 text-brand mx-auto mb-2" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-xs">正在拉取商品列表...</span>
        </div>

        <div id="products-table" class="hidden overflow-x-auto">
          <table class="w-full text-left border-collapse text-sm">
            <thead>
              <tr class="border-b border-gray-100 text-gray-400 text-xs uppercase tracking-wider font-bold">
                <th class="py-3 px-4">主图</th>
                <th class="py-3 px-4">商品名</th>
                <th class="py-3 px-4">价格</th>
                <th class="py-3 px-4 text-right">操作</th>
              </tr>
            </thead>
            <tbody id="products-tbody" class="divide-y divide-gray-100">
              <!-- Dynamically populated rows -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </main>

  <!-- Notification Toast -->
  <div id="toast" class="fixed bottom-6 right-6 z-50 bg-gray-900 text-white px-5 py-3 rounded shadow-lg text-sm flex items-center space-x-2.5 opacity-0 pointer-events-none transform translate-y-2 transition-all duration-300">
    <div class="bg-emerald-500 rounded-full p-1 text-white" id="toast-icon-box">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
      </svg>
    </div>
    <span id="toast-message">操作成功！</span>
  </div>

  <script>
    let products = [];

    // On Load Check Authentication status
    window.addEventListener('DOMContentLoaded', () => {
      checkCurrentSessionAuth();
    });

    // Helper to retrieve auth header password
    function getAdminPassword() {
      return sessionStorage.getItem('admin_password') || '';
    }

    // Check if user is already logged in
    async function checkCurrentSessionAuth() {
      const password = getAdminPassword();
      if (!password) {
        showLoginShield();
        return;
      }

      // Verify token with backend
      try {
        const response = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        
        if (response.ok) {
          enterAdminDashboard();
        } else {
          sessionStorage.removeItem('admin_password');
          showLoginShield();
        }
      } catch (err) {
        console.error('Session validation error:', err);
        showLoginShield();
      }
    }

    // Submit handler for the login popup
    async function handleLoginSubmit(event) {
      event.preventDefault();
      const passwordInput = document.getElementById('login-password');
      const password = passwordInput.value;
      const errorMsg = document.getElementById('login-error-msg');

      errorMsg.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        if (response.ok) {
          sessionStorage.setItem('admin_password', password);
          passwordInput.value = '';
          enterAdminDashboard();
        } else {
          errorMsg.classList.remove('hidden');
          passwordInput.select();
        }
      } catch (err) {
        showToast('连接服务器验证失败，请重试。', 'error');
        console.error(err);
      }
    }

    // Toggle layouts to show editor
    function enterAdminDashboard() {
      document.getElementById('login-shield').classList.add('hidden');
      document.getElementById('access-denied').classList.add('hidden');
      
      const adminContent = document.getElementById('admin-content');
      adminContent.classList.remove('hidden');
      adminContent.classList.add('grid');
      
      document.getElementById('btn-logout').classList.remove('hidden');

      fetchProducts();
    }

    // Toggle layouts to show login modal
    function showLoginShield() {
      document.getElementById('login-shield').classList.remove('hidden');
      document.getElementById('access-denied').classList.add('hidden');
      document.getElementById('admin-content').classList.add('hidden');
      document.getElementById('admin-content').classList.remove('grid');
      document.getElementById('btn-logout').classList.add('hidden');
    }

    // Triggered when wrong password is input and modal is bypassed, or manually logged out
    function showAccessDenied() {
      document.getElementById('login-shield').classList.add('hidden');
      document.getElementById('access-denied').classList.remove('hidden');
      document.getElementById('admin-content').classList.add('hidden');
      document.getElementById('admin-content').classList.remove('grid');
      document.getElementById('btn-logout').classList.add('hidden');
    }

    function handleLogout() {
      sessionStorage.removeItem('admin_password');
      showLoginShield();
      showToast('已成功退出登录。');
    }

    // Fetch list from Server
    async function fetchProducts() {
      try {
        const response = await fetch('/api/products');
        if (!response.ok) throw new Error('API fetch failed');
        products = await response.json();
        renderProductsTable();
      } catch (err) {
        showToast('获取商品列表失败，请确认是否具有管理员权限。', 'error');
        console.error(err);
      }
    }

    // Render Table Row
    function renderProductsTable() {
      const listContainer = document.getElementById('loading-list');
      const tableContainer = document.getElementById('products-table');
      const tbody = document.getElementById('products-tbody');

      listContainer.classList.add('hidden');

      if (products.length === 0) {
        tableContainer.classList.add('hidden');
        listContainer.classList.remove('hidden');
        listContainer.innerHTML = `<span class="text-xs text-gray-400 font-medium">当前无任何已录入商品</span>`;
        return;
      }

      tableContainer.classList.remove('hidden');
      tbody.innerHTML = products.map(product => {
        const imgUrl = product.main_image || '/uploads/placeholder.png';
        return `
          <tr class="hover:bg-gray-50/50 transition-colors">
            <td class="py-3.5 px-4">
              <img src="${imgUrl}" alt="${escapeHtml(product.name)}" class="w-12 h-12 object-cover rounded border border-gray-100" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'48\' height=\'48\' viewBox=\'0 0 48 48\'><rect width=\'48\' height=\'48\' fill=\'%23f3f4f6\'/></svg>'">
            </td>
            <td class="py-3.5 px-4 font-semibold text-gray-900">
              ${escapeHtml(product.name)}
              <div class="text-xs text-gray-400 font-normal line-clamp-1 mt-0.5 max-w-[240px]">${escapeHtml(product.short_desc)}</div>
            </td>
            <td class="py-3.5 px-4 font-bold text-brand">¥${product.price}</td>
            <td class="py-3.5 px-4 text-right space-x-2">
              <button onclick="editProduct('${product.id}')" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition-colors">编辑</button>
              <button onclick="deleteProduct('${product.id}')" class="text-xs font-bold text-brand hover:text-brand-hover transition-colors">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Handle File Upload dynamically via Ajax
    async function uploadFile(inputElement, targetFieldId, previewId) {
      const file = inputElement.files[0];
      if (!file) return;

      // Temporary loading UI
      const originalLabel = inputElement.parentElement;
      const originalText = originalLabel.innerHTML;
      originalLabel.innerHTML = `<span>上传中...</span>`;
      
      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          headers: {
            'X-Admin-Password': getAdminPassword()
          },
          body: formData
        });
        
        const result = await response.json();
        if (!response.ok || !result.success) {
          if (response.status === 401) {
            showAccessDenied();
            throw new Error('未授权：密码错误');
          }
          throw new Error(result.error || 'Upload error');
        }

        // Set the value of the input field to the uploaded URL
        document.getElementById(targetFieldId).value = result.url;
        showToast('图片上传成功！');
        
        // Render preview
        if (previewId) {
          const previewImg = document.getElementById(previewId);
          previewImg.src = result.url;
          document.getElementById(previewId + '-box').classList.remove('hidden');
        }
      } catch (err) {
        showToast('图片上传失败: ' + err.message, 'error');
        console.error(err);
      } finally {
        originalLabel.innerHTML = originalText;
      }
    }

    // Gallery Inputs Helper
    function addGalleryInput(value = '') {
      const container = document.getElementById('gallery-inputs');
      const inputId = 'gallery_img_' + Date.now() + Math.floor(Math.random() * 100);
      
      const item = document.createElement('div');
      item.className = 'flex gap-2 items-center gallery-input-row';
      item.innerHTML = `
        <input type="text" value="${value}" placeholder="子图相对路径或外部 URL" class="w-full bg-gray-50 border border-gray-200 rounded px-3 py-2 text-sm focus:outline-none focus:border-brand focus:bg-white transition-colors gallery-url-field">
        <label class="flex-shrink-0 cursor-pointer bg-gray-150 hover:bg-gray-200 border border-gray-300 text-gray-700 text-xs font-semibold px-3 py-2 rounded flex items-center justify-center transition-colors">
          <span>上传</span>
          <input type="file" accept="image/*" class="hidden" onchange="uploadFile(this, '${inputId}')">
        </label>
        <button type="button" onclick="this.parentElement.remove()" class="text-gray-400 hover:text-brand transition-colors p-1.5 rounded">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
        </button>
      `;
      // assign the ID dynamically to the first input for binding
      item.querySelector('input[type="text"]').id = inputId;
      container.appendChild(item);
    }

    function clearPreview(fieldId, boxId) {
      document.getElementById(fieldId).value = '';
      document.getElementById(boxId).classList.add('hidden');
    }

    // Submit Form (Create or Update)
    async function handleFormSubmit(event) {
      event.preventDefault();

      const id = document.getElementById('product-id').value;
      const name = document.getElementById('name').value;
      const price = parseFloat(document.getElementById('price').value);
      const short_desc = document.getElementById('short_desc').value;
      const long_desc = document.getElementById('long_desc').value;
      const main_image = document.getElementById('main_image').value;

      // Extract gallery URLs
      const galleryRows = document.querySelectorAll('.gallery-url-field');
      const gallery_images = Array.from(galleryRows)
        .map(input => input.value.trim())
        .filter(url => url !== '');

      const payload = {
        name,
        price,
        short_desc,
        long_desc,
        main_image,
        gallery_images: gallery_images.length > 0 ? gallery_images : [main_image]
      };

      const isEdit = !!id;
      const url = isEdit ? `/api/products/${id}` : '/api/products';
      const method = isEdit ? 'PUT' : 'POST';

      try {
        const response = await fetch(url, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Password': getAdminPassword()
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (!response.ok) {
          if (response.status === 401) {
            showAccessDenied();
            throw new Error('权限验证失败：密码错误');
          }
          throw new Error(result.error || 'Submit failed');
        }

        showToast(isEdit ? '商品修改成功！' : '商品录入成功！');
        resetForm();
        fetchProducts();
      } catch (err) {
        showToast('提交失败：' + err.message, 'error');
        console.error(err);
      }
    }

    // Edit Product Trigger
    function editProduct(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('product-id').value = product.id;
      document.getElementById('name').value = product.name;
      document.getElementById('price').value = product.price;
      document.getElementById('short_desc').value = product.short_desc || '';
      document.getElementById('long_desc').value = product.long_desc || '';
      document.getElementById('main_image').value = product.main_image || '';
      
      // Main preview
      if (product.main_image) {
        document.getElementById('main-image-preview').src = product.main_image;
        document.getElementById('main-image-preview-box').classList.remove('hidden');
      } else {
        document.getElementById('main-image-preview-box').classList.add('hidden');
      }

      // Reset & Populate Gallery Inputs
      const galleryInputsContainer = document.getElementById('gallery-inputs');
      galleryInputsContainer.innerHTML = '';
      if (product.gallery_images && product.gallery_images.length > 0) {
        product.gallery_images.forEach(img => {
          addGalleryInput(img);
        });
      }

      // UI state
      document.getElementById('form-title').textContent = '修改商品好物';
      document.getElementById('edit-badge').classList.remove('hidden');
      document.getElementById('btn-cancel').classList.remove('hidden');
      document.getElementById('btn-submit').textContent = '保存修改';
      
      // Scroll form into view
      document.getElementById('product-form').scrollIntoView({ behavior: 'smooth' });
    }

    // Reset form to normal add state
    function resetForm() {
      document.getElementById('product-id').value = '';
      document.getElementById('product-form').reset();
      document.getElementById('main-image-preview-box').classList.add('hidden');
      document.getElementById('gallery-inputs').innerHTML = '';
      
      document.getElementById('form-title').textContent = '新增商品好物';
      document.getElementById('edit-badge').classList.add('hidden');
      document.getElementById('btn-cancel').classList.add('hidden');
      document.getElementById('btn-submit').textContent = '保存商品';
    }

    // Delete Product
    async function deleteProduct(id) {
      if (!confirm('确认要删除该商品吗？此操作无法撤销。')) return;

      try {
        const response = await fetch(`/api/products/${id}`, {
          method: 'DELETE',
          headers: {
            'X-Admin-Password': getAdminPassword()
          }
        });
        
        const result = await response.json();
        if (!response.ok) {
          if (response.status === 401) {
            showAccessDenied();
            throw new Error('未授权：密码错误');
          }
          throw new Error(result.error || 'Delete failed');
        }

        showToast('商品已被移除。');
        fetchProducts();
        
        // If we were editing this product, reset the form
        if (document.getElementById('product-id').value === id) {
          resetForm();
        }
      } catch (err) {
        showToast('删除失败：' + err.message, 'error');
        console.error(err);
      }
    }

    // String Sanitization
    function escapeHtml(str) {
      if (!str) return '';
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Toast Alert
    let toastTimeout;
    function showToast(message, type = 'success') {
      const toastEl = document.getElementById('toast');
      const msgEl = document.getElementById('toast-message');
      const iconBox = document.getElementById('toast-icon-box');

      msgEl.textContent = message;

      if (type === 'error') {
        iconBox.className = 'bg-brand rounded-full p-1 text-white';
        iconBox.innerHTML = `
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        `;
      } else {
        iconBox.className = 'bg-emerald-500 rounded-full p-1 text-white';
        iconBox.innerHTML = `
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
          </svg>
        `;
      }

      toastEl.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-2');
      toastEl.classList.add('opacity-100', 'translate-y-0');
      
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toastEl.classList.add('opacity-0', 'pointer-events-none', 'translate-y-2');
        toastEl.classList.remove('opacity-100', 'translate-y-0');
      }, 3500);
    }
  </script>
</body>
</html>
